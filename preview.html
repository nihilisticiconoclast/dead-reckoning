<title>Dead Reckoning — a forecasting log</title>
<meta name="description" content="Probabilistic forecasts, pre-registered by commit and scored with proper scoring rules.">
<style>
/* Dead Reckoning — Tunnel tokens
   Cartography × phase-space. Parchment ink on a deep phase-space ground; a warm
   route (you) and a cool route (the model). Stand-in for your own tokens.css —
   the variable names are the contract, the values are yours to replace. */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  /* ground + structure */
  --ground:        #0c0f14;
  --ground-raised: #141a23;
  --ground-sunk:   #090b0f;
  --contour:       rgba(143, 162, 184, 0.10);
  --contour-bold:  rgba(143, 162, 184, 0.18);
  --hairline:      rgba(143, 162, 184, 0.16);

  /* ink */
  --ink:      #e9e3d4;   /* parchment, primary text */
  --ink-dim:  #93a0ae;   /* muted slate */
  --ink-faint:#5f6b78;

  /* routes */
  --route-you:   #e0954a;   /* sienna — your committed line */
  --route-model: #4fb6a8;   /* teal — the model */
  --route-you-soft:   rgba(224, 149, 74, 0.16);
  --route-model-soft: rgba(79, 182, 168, 0.16);

  /* outcomes */
  --yes: #79b07a;
  --no:  #c8635a;

  /* type */
  --display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
  --mono:    'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  /* type scale */
  --t-hero:   clamp(2.6rem, 7vw, 4.6rem);
  --t-h2:     1.05rem;
  --t-body:   0.95rem;
  --t-small:  0.8rem;
  --t-micro:  0.68rem;

  /* space + form */
  --gap:    1.5rem;
  --pad:    1.35rem;
  --radius: 4px;
  --maxw:   1080px;
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--ground);
  color: var(--ink);
  font-family: var(--body);
  font-size: var(--t-body);
  line-height: 1.55;
  letter-spacing: 0.01em;
  -webkit-font-smoothing: antialiased;
}

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 1.25rem; }

/* eyebrow / chart labels */
.eyebrow {
  font-family: var(--mono);
  font-size: var(--t-micro);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin: 0 0 0.6rem;
}

h2.section {
  font-family: var(--display);
  font-weight: 500;
  font-size: 1.6rem;
  letter-spacing: -0.01em;
  margin: 0 0 1.1rem;
  color: var(--ink);
}

.mono { font-family: var(--mono); }
.dim  { color: var(--ink-dim); }
.faint{ color: var(--ink-faint); }

a { color: var(--route-you); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

/* panels */
.panel {
  background: var(--ground-raised);
  border: 1px solid var(--hairline);
  border-radius: var(--radius);
  padding: var(--pad);
}

/* a thin contour rule */
.rule { height: 1px; background: var(--hairline); border: 0; margin: 0; }

:focus-visible { outline: 2px solid var(--route-you); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* Dead Reckoning — page layout. Uses the variables from tokens.css. */

/* hero ---------------------------------------------------------------------- */
.hero {
  position: relative;
  height: clamp(300px, 46vh, 420px);
  border-bottom: 1px solid var(--hairline);
  background: var(--ground-sunk);
  overflow: hidden;
}
.hero canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.hero-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: flex-end;
  max-width: var(--maxw); margin: 0 auto; padding: 0 1.25rem 2rem;
  background: linear-gradient(to bottom, transparent 40%, rgba(9,11,15,.55) 100%);
}
.hero h1 {
  font-family: var(--display);
  font-weight: 600;
  font-size: var(--t-hero);
  line-height: 0.96;
  letter-spacing: -0.02em;
  margin: 0.2rem 0 0.5rem;
  color: var(--ink);
}
.hero .coords { color: var(--route-you); }
.hero .thesis {
  max-width: 40rem; margin: 0; color: var(--ink-dim);
  font-size: clamp(0.95rem, 1.6vw, 1.1rem);
}

/* spacing ------------------------------------------------------------------- */
main#app { display: block; }
main#app > section { max-width: var(--maxw); margin: 0 auto; padding: 2.6rem 1.25rem 0; }
main#app > .rule { max-width: var(--maxw); margin: 2.6rem auto 0; }
main#app > footer { max-width: var(--maxw); margin: 0 auto; padding: 1.4rem 1.25rem 3rem; }

/* scoreboard ---------------------------------------------------------------- */
.standing {
  display: grid;
  grid-template-columns: 1fr auto 1fr 1.2fr;
  align-items: center; gap: var(--gap);
  padding-top: 2.6rem;
}
.score-card { background: var(--ground-raised); border: 1px solid var(--hairline);
  border-radius: var(--radius); padding: 1.1rem 1.2rem; }
.score-brier { font-size: 2.7rem; line-height: 1; margin-top: 0.5rem; }
.score-sub { font-size: var(--t-micro); margin-top: 0.25rem; }
.score-row { display: flex; gap: 1.2rem; margin-top: 0.9rem; font-size: var(--t-small); }
.versus { font-size: var(--t-small); text-align: center; }
.score-meta { padding-left: 0.4rem; font-size: var(--t-small); line-height: 1.9; }
.score-meta .figure { font-size: 1.05rem; color: var(--ink); }

/* two-column ---------------------------------------------------------------- */
.grid-2 { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr); gap: var(--gap); align-items: start; }

/* plots --------------------------------------------------------------------- */
.plot { margin: 0; }
.plot svg { width: 100%; height: auto; display: block; }
.plot.wide svg { max-height: 280px; }
figcaption { margin-top: 0.7rem; font-size: var(--t-small); }
.ax { fill: var(--ink-faint); font-family: var(--mono); font-size: 10px; }
.ax-t { fill: var(--ink-dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.03em; }

/* readout / prose ----------------------------------------------------------- */
.readout { padding-top: 0.4rem; }
.lede { color: var(--ink-dim); margin: 0 0 1rem; }
.lede .mono { color: var(--ink); }
.key { list-style: none; padding: 0; margin: 0; display: flex; gap: 1.4rem; font-size: var(--t-small); }
.key li { display: flex; align-items: center; gap: 0.5rem; }
.dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }

/* decomposition ------------------------------------------------------------- */
table.decomp { width: 100%; border-collapse: collapse; }
table.decomp th, table.decomp td { text-align: left; padding: 0.55rem 0.6rem; border-bottom: 1px solid var(--hairline); vertical-align: middle; }
table.decomp thead th { font-family: var(--mono); font-size: var(--t-micro); letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); border-bottom-color: var(--contour-bold); }
table.decomp tbody th { font-weight: 400; font-size: var(--t-small); color: var(--ink); }
table.decomp td.mono { width: 4.5rem; }
table.decomp tr.sum th, table.decomp tr.sum td { border-bottom: none; padding-top: 0.8rem; color: var(--ink); }
.meter { display: block; width: 96px; height: 6px; background: var(--ground-sunk); border-radius: 3px; overflow: hidden; }
.meter > span { display: block; height: 100%; }

/* ledgers ------------------------------------------------------------------- */
table.ledger { width: 100%; border-collapse: collapse; font-size: var(--t-small); }
table.ledger th, table.ledger td { text-align: left; padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--hairline); }
table.ledger thead th { font-family: var(--mono); font-size: var(--t-micro); letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); border-bottom-color: var(--contour-bold); white-space: nowrap; }
table.ledger tbody tr:hover { background: rgba(143, 162, 184, 0.05); }
table.ledger td.id { color: var(--ink-dim); white-space: nowrap; }
table.ledger td.mono.lead { color: var(--route-you); }
.cat { font-size: var(--t-micro); letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faint); border: 1px solid var(--contour-bold); border-radius: 2px; padding: 0.05rem 0.35rem; white-space: nowrap; }

/* responsive ---------------------------------------------------------------- */
@media (max-width: 860px) {
  .grid-2 { grid-template-columns: 1fr; }
  .standing { grid-template-columns: 1fr 1fr; }
  .versus { display: none; }
  .score-meta { grid-column: 1 / -1; padding-left: 0; }
}
@media (max-width: 560px) {
  .standing { grid-template-columns: 1fr; }
  .panel { overflow-x: auto; }
  table.ledger { min-width: 460px; }
}

</style>

/* Dead Reckoning — tunnel-figure
   Seeded contour terrain (marching squares over a smooth scalar field) with a
   route that follows the valley, then tunnels straight through the ridge. The
   seed makes the terrain deterministic; the route is the signature. */
(function () {
  'use strict';

  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // smooth field: a few seeded gaussian hills/basins + one dominant ridge
  function makeField(seed) {
    var r = mulberry32(seed >>> 0);
    var bumps = [];
    for (var i = 0; i < 4; i++) {
      bumps.push({ cx: 0.12 + r() * 0.76, cy: 0.12 + r() * 0.76,
                   h: (r() * 2 - 1) * 1.1, s: 0.13 + r() * 0.16 });
    }
    var k = 1.1 + r() * 1.1, ph = r() * 6.283, ang = (r() * 0.6 - 0.3);
    return function (x, y) {
      var v = 0.55 * Math.sin((x * Math.cos(ang) + y * (0.35 + Math.sin(ang))) * Math.PI * k + ph);
      for (var i = 0; i < bumps.length; i++) {
        var b = bumps[i], dx = x - b.cx, dy = y - b.cy;
        v += b.h * Math.exp(-(dx * dx + dy * dy) / (2 * b.s * b.s));
      }
      return v;
    };
  }

  function interp(level, va, vb, a, b) { var t = (level - va) / (vb - va); return a + t * (b - a); }

  // marching squares -> array of [[x0,y0],[x1,y1]] segments in unit coords
  function isolines(field, cols, rows, level) {
    var segs = [];
    for (var j = 0; j < rows; j++) {

      '<div class="panel"><table class="ledger"><thead><tr>' +
        '<th>ID</th><th>Question</th><th style="color:' + YOU + '">You</th>' +
        '<th style="color:' + MODEL + '">Claude</th><th>Outcome</th><th>Your Brier</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>' +
        '<p class="dim" style="margin:.9rem 0 0">Highlighted Brier marks the forecast where you matched or beat the model.</p>' +
      '</div></section>';
  }

  // ---- footer ---------------------------------------------------------------
  function footer(d) {
    return '<footer><hr class="rule"/>' +
      '<p class="mono faint">Generated ' + esc(d.generated_at) +
      ' · forecasts are pre-registered by commit timestamp · regenerated nightly by GitHub Actions</p></footer>';
  }

  // ---- boot -----------------------------------------------------------------
  function render(d) {
    var app = document.getElementById('app');
    app.innerHTML =
      scoreboard(d) + '<hr class="rule"/>' +
      calibration(d) +
      decomposition(d) +
      timeseries(d) +
      positions(d) +
      awaiting(d) +
      log(d) +
      footer(d);
  }

  function fail(msg) {
    var app = document.getElementById('app');
    app.innerHTML = '<section class="panel"><div class="eyebrow">No fix</div>' +
      '<p>Could not load <span class="mono">data.json</span>. ' + esc(msg) +
      '</p><p class="dim">Run the scorer (<span class="mono">Rscript R/score.R</span>) to generate it.</p></section>';
  }

  if (window.__DATA__) { render(window.__DATA__); return; }
  fetch('./data.json', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function (e) { fail(e.message); });
})();

  </script>
</body>
</html>
