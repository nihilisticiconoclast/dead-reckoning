# Dead Reckoning — forecast ledger
# ---------------------------------
# This file is the single source of truth. A forecast is *committed* the moment
# it lands in a commit on `develop`/`main`; the commit timestamp is your
# tamper-evident proof that the probability pre-dates the outcome. Do not edit a
# forecast after its `resolves` date — that is the one rule the whole instrument
# rests on.
#
# To add a question:    append a block, set forecasts.you (and resolves/resolution).
# To resolve manually:  set `outcome:` to 1 (happened) or 0 (did not).
# Automatic resolution: give it a `resolution.type: http_json` block (see q-021).
#
# Probabilities are P(the statement is true). Sharper (nearer 0/1) is rewarded
# only when you are right — that is the point of a proper scoring rule.

