# Dead Reckoning — forecast ledger
# ---------------------------------
# This file is the single source of truth. A forecast is *committed* the moment
# it lands in a commit on the default branch; the commit timestamp is your
# tamper-evident proof that the probability pre-dates the outcome. Do not edit a
# forecast after its `resolves` date — that is the one rule the whole instrument
# rests on.
#
# >>> THESE ARE YOUR REAL QUESTIONS, AWAITING YOUR PROBABILITIES. <<<
# Each block has an empty  forecasts: { you: }  — fill in your probability that
# the statement is TRUE, a decimal between 0.01 and 0.99, then commit. Sharper
# (nearer 0/1) is rewarded only when you are right; that is the point of a proper
# scoring rule. The `claude:` values are Claude's own rival forecasts, committed
# from a Claude session and git-dated exactly like yours — you only fill `you:`.
# For new questions, have Claude forecast them in a session, or set the optional
# ANTHROPIC_API_KEY secret to let the nightly Action register them automatically.
#
# To add a question:    append a block, set forecasts.you (+ resolves/resolution).
# To resolve manually:  set `outcome:` to 1 (happened) or 0 (did not), then commit.
# Automatic resolution: give it a `resolution.type: http_json` block (see q-014).

