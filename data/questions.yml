  # ---- meta ---------------------------------------------------------------
  # q-014 demonstrates the http_json resolver: the daily Action fetches a JSON
  # document, walks `path`, and compares against `threshold` with `op` — no secret
  # required. Use it as the template for any automatically-resolvable question.
  - id: q-014
    text: "The dead-reckoning repo has at least 5 GitHub stars by 31 Dec 2026"
    category: meta
    created: 2026-06-22
    resolves: 2026-12-31
    resolution:
      type: http_json
      url: "https://api.github.com/repos/nihilisticiconoclast/dead-reckoning"
      path: "stargazers_count"
      op: ">="
      threshold: 5
      note: "Resolved automatically against the GitHub REST API"
    forecasts: { you: }

