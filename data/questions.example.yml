# Dead Reckoning — EXAMPLE ledger (not your real one)
# ---------------------------------------------------
# A small, fully-resolved fixture for exercising the scoring pipeline end to end,
# including the continuous (CRPS) path. It does not touch data/questions.yml.
#
#   DR_QUESTIONS=data/questions.example.yml DR_OUT=/tmp/dr-demo.json Rscript R/score.R
#   DR_OUT=/tmp/dr-demo.json LANGFUSE_DRY_RUN=1 Rscript R/push_scores.R
#
# Expected (cross-checked numerically):
#   binary  you    Brier 0.1050  logloss 0.3635  BSS 0.58
#   binary  claude Brier 0.1775  logloss 0.5445  BSS 0.29
#   contin. you    CRPSS 0.3530   |  claude CRPSS 0.1836   (equal-weight skill)

questions:

  # ---- binary (Brier / Murphy) ----------------------------------------------
  - id: q-b1
    text: "Example binary 1"
    category: fx
    created: 2026-01-01
    resolves: 2026-03-01
    resolution: { type: manual, note: "fixture" }
    forecasts: { you: 0.70, claude: 0.60 }
    outcome: 1

  - id: q-b2
    text: "Example binary 2"
